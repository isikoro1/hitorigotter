<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ひとりごったー web" />
    <title>ひとりごったー</title>
    <link rel="stylesheet" href="./styles.css?v=20260622-quote-cache" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-pane">
        <header class="topbar">
          <strong id="activeAccountLabel">ひとりごったー</strong>
        </header>

        <section class="screen" id="homeScreen">
          <section class="composer" aria-label="投稿作成">
            <textarea
              id="postInput"
              maxlength="1000"
              rows="5"
              placeholder="今だけの考えを書く。#タグ、- リスト、- [ ] todo も使えます。"
            ></textarea>
            <div class="composer-foot">
              <div class="insert-actions" aria-label="入力補助">
                <button class="insert-button" id="insertListButton" type="button" title="リストを追加">
                  <span aria-hidden="true">•</span>
                  <span class="sr-only">リストを追加</span>
                </button>
                <button class="insert-button" id="insertTodoButton" type="button" title="todoを追加">
                  <span aria-hidden="true">☐</span>
                  <span class="sr-only">todoを追加</span>
                </button>
                <button class="insert-button" id="insertTagButton" type="button" title="ハッシュタグを追加">
                  <span aria-hidden="true">#</span>
                  <span class="sr-only">ハッシュタグを追加</span>
                </button>
              </div>
              <div class="post-actions">
                <span id="charCount">0 / 1000</span>
                <button class="primary-button" id="postButton" type="button">投稿</button>
              </div>
            </div>
          </section>

          <section class="timeline" id="homeTimeline" aria-live="polite"></section>
        </section>

        <section class="screen" id="searchScreen" hidden>
          <section class="tools-row search-tools" aria-label="検索">
            <label class="search-field">
              <span class="sr-only">検索</span>
              <input id="searchInput" type="search" placeholder="本文、タグ、IDを検索" />
            </label>
            <select id="sortSelect" aria-label="並び順">
              <option value="newest">新しい順</option>
              <option value="oldest">古い順</option>
            </select>
            <input id="dateInput" type="date" aria-label="日付" />
            <select id="dateModeSelect" aria-label="日付フィルター">
              <option value="any">日付指定なし</option>
              <option value="on">選択日</option>
              <option value="since">選択日以降</option>
              <option value="until">選択日以前</option>
            </select>
          </section>

          <section class="timeline" id="searchTimeline" aria-live="polite"></section>
        </section>

        <section class="screen account-screen" id="accountScreen" hidden>
          <section class="account-composer" aria-label="アカウント作成">
            <input
              id="accountNameInput"
              type="text"
              maxlength="28"
              placeholder="メモ用アカウント名"
              autocomplete="off"
            />
            <button class="primary-button" id="addAccountButton" type="button">追加</button>
          </section>

          <section class="account-list" id="accountList" aria-label="アカウント一覧"></section>
        </section>

        <section class="screen analytics-screen" id="analyticsScreen" hidden>
          <section class="analytics-grid">
            <article class="analytics-panel">
              <h2>日別投稿数</h2>
              <div class="bar-chart" id="dailyChart"></div>
            </article>
            <article class="analytics-panel">
              <h2>時間帯</h2>
              <div class="bar-chart compact" id="hourChart"></div>
            </article>
            <article class="analytics-panel">
              <h2>曜日</h2>
              <div class="bar-chart compact" id="weekdayChart"></div>
            </article>
            <article class="analytics-panel">
              <h2>頻出語</h2>
              <div class="word-list" id="wordList"></div>
            </article>
          </section>
        </section>

        <section class="screen settings-screen" id="settingsScreen" hidden>
          <label class="setting-row">
            <span>テーマ</span>
            <select id="themeSelect">
              <option value="default">ひとりごったー</option>
              <option value="terminal">ターミナル風</option>
              <option value="dragon">ドラクエ風</option>
              <option value="line">LINE風</option>
            </select>
          </label>

          <label class="setting-row checkbox-row">
            <input id="enterToPostInput" type="checkbox" />
            <span>Enterで投稿する</span>
          </label>

          <label class="setting-row checkbox-row">
            <input id="hideAvatarsInput" type="checkbox" />
            <span>投稿アイコンを非表示にする</span>
          </label>

          <label class="setting-row checkbox-row">
            <input id="hideAuthorNameInput" type="checkbox" />
            <span>投稿者名を非表示にする</span>
          </label>

          <button class="settings-button" id="exportButton" type="button">
            <span aria-hidden="true">↓</span>
            <span>JSONを書き出す</span>
          </button>
          <label class="settings-button file-button">
            <span aria-hidden="true">↑</span>
            <span>JSONを読み込む</span>
            <input id="importInput" type="file" accept="application/json" />
          </label>
          <button class="settings-button" id="exportMarkdownButton" type="button">
            <span aria-hidden="true">↓</span>
            <span>Markdownを書き出す</span>
          </button>
          <label class="settings-button file-button">
            <span aria-hidden="true">↑</span>
            <span>Markdownを読み込む</span>
            <input id="importMarkdownInput" type="file" accept=".md,text/markdown,text/plain" />
          </label>
        </section>
      </main>
    </div>

    <nav class="bottom-nav" aria-label="画面切り替え">
      <button class="bottom-nav-button active" data-screen="home" type="button" aria-label="ホーム">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z" />
        </svg>
      </button>
      <button class="bottom-nav-button" data-screen="search" type="button" aria-label="検索">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.5 18a7.5 7.5 0 1 1 5.3-12.8 7.5 7.5 0 0 1 0 10.6L21 21l-2 2-5.2-5.2A7.4 7.4 0 0 1 10.5 18zm0-3a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9z" />
        </svg>
      </button>
      <button class="bottom-nav-button" data-screen="account" type="button" aria-label="アカウント">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm-8 9a8 8 0 0 1 16 0z" />
        </svg>
      </button>
      <button class="bottom-nav-button" data-screen="analytics" type="button" aria-label="分析">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 20V4h2v14h14v2H4zm4-4V9h3v7H8zm5 0V6h3v10h-3zm5 0v-5h3v5h-3z" />
        </svg>
      </button>
      <button class="bottom-nav-button" data-screen="settings" type="button" aria-label="設定">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2h-4l-.4 3a8 8 0 0 0-2.6 1.5l-2.4-1-2 3.5 2 1.5A9 9 0 0 0 4.5 12c0 .5 0 1 .1 1.5l-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.6 1.5l.4 3h4l.4-3a8 8 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z" />
        </svg>
      </button>
    </nav>

    <dialog class="text-modal" id="textModal">
      <form method="dialog" class="text-modal-panel">
        <header class="text-modal-head">
          <strong id="textModalTitle">入力</strong>
          <button class="modal-icon-button" id="textModalCloseButton" value="cancel" type="submit" aria-label="閉じる">
            ×
          </button>
        </header>
        <textarea id="textModalInput" maxlength="1000" rows="8"></textarea>
        <footer class="text-modal-actions">
          <button class="settings-button modal-cancel-button" value="cancel" type="submit">キャンセル</button>
          <button class="primary-button" id="textModalSaveButton" value="default" type="submit">保存</button>
        </footer>
      </form>
    </dialog>

    <template id="postTemplate">
      <article class="post-card">
        <div class="post-line" aria-hidden="true"></div>
        <div class="post-content">
          <header class="post-header">
            <div class="avatar small post-avatar" aria-hidden="true"></div>
            <div class="post-meta">
              <strong class="post-name"></strong>
              <a class="post-id-link" href="#"></a>
            </div>
            <time class="post-time"></time>
            <details class="post-menu">
              <summary aria-label="投稿メニュー">⋯</summary>
              <div class="post-menu-panel">
                <button class="edit-button" type="button">編集</button>
                <button class="quote-button" type="button">引用</button>
                <button class="reply-button" type="button">返信</button>
                <button class="pin-button" type="button">固定</button>
                <button class="delete-button danger" type="button">削除</button>
              </div>
            </details>
          </header>
          <div class="post-text md-content"></div>
          <div class="post-tags"></div>
          <section class="reply-list"></section>
        </div>
      </article>
    </template>

    <script src="./app.js?v=20260622-quote-cache"></script>
  </body>
</html>
